<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#04c444"/>
      <stop offset="100%" style="stop-color:#0084c2"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="500" fill="#0a0f14"/>
  <!-- Logo -->
  <rect x="16" y="16" width="148" height="36" rx="6" fill="url(#green)" opacity="0.15"/>
  <text x="90" y="39" font-family="'Bebas Neue', sans-serif" font-size="20" font-weight="bold" fill="#04c444" text-anchor="middle">PROTACTICS</text>
  <!-- Nav items -->
  <rect x="12" y="70" width="156" height="32" rx="6" fill="url(#green)" opacity="0.2"/>
  <text x="30" y="91" font-family="sans-serif" font-size="13" fill="#04c444">⚽  Dashboard</text>
  <text x="30" y="127" font-family="sans-serif" font-size="13" fill="#8b949e">👥  Players</text>
  <text x="30" y="159" font-family="sans-serif" font-size="13" fill="#8b949e">🏃  Training</text>
  <text x="30" y="191" font-family="sans-serif" font-size="13" fill="#8b949e">📋  Teams</text>
  <text x="30" y="223" font-family="sans-serif" font-size="13" fill="#8b949e">📢  Publications</text>
  <text x="30" y="255" font-family="sans-serif" font-size="13" fill="#8b949e">🎯  Tactics Board</text>

  <!-- Main content area -->
  <!-- Header -->
  <rect x="180" y="0" width="620" height="52" fill="#161b22"/>
  <text x="204" y="32" font-family="sans-serif" font-size="16" font-weight="600" fill="#e6edf3">Dashboard</text>
  <rect x="676" y="12" width="28" height="28" rx="14" fill="url(#green)" opacity="0.8"/>
  <text x="690" y="31" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">AT</text>

  <!-- Stats row -->
  <rect x="200" y="68" width="130" height="72" rx="8" fill="#1c2128"/>
  <text x="216" y="92" font-family="sans-serif" font-size="11" fill="#8b949e">Total Players</text>
  <text x="216" y="120" font-family="sans-serif" font-size="28" font-weight="bold" fill="#e6edf3">24</text>
  <rect x="216" y="126" width="30" height="3" rx="1" fill="#04c444" opacity="0.8"/>

  <rect x="342" y="68" width="130" height="72" rx="8" fill="#1c2128"/>
  <text x="358" y="92" font-family="sans-serif" font-size="11" fill="#8b949e">Trainings</text>
  <text x="358" y="120" font-family="sans-serif" font-size="28" font-weight="bold" fill="#e6edf3">18</text>
  <rect x="358" y="126" width="30" height="3" rx="1" fill="#0084c2" opacity="0.8"/>

  <rect x="484" y="68" width="130" height="72" rx="8" fill="#1c2128"/>
  <text x="500" y="92" font-family="sans-serif" font-size="11" fill="#8b949e">Teams</text>
  <text x="500" y="120" font-family="sans-serif" font-size="28" font-weight="bold" fill="#e6edf3">3</text>
  <rect x="500" y="126" width="30" height="3" rx="1" fill="#04c444" opacity="0.8"/>

  <rect x="626" y="68" width="130" height="72" rx="8" fill="#1c2128"/>
  <text x="642" y="92" font-family="sans-serif" font-size="11" fill="#8b949e">Publications</text>
  <text x="642" y="120" font-family="sans-serif" font-size="28" font-weight="bold" fill="#e6edf3">7</text>
  <rect x="642" y="126" width="30" height="3" rx="1" fill="#0084c2" opacity="0.8"/>

  <!-- Training list -->
  <rect x="200" y="156" width="340" height="200" rx="8" fill="#1c2128"/>
  <text x="220" y="180" font-family="sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Recent Trainings</text>
  <!-- rows -->
  <rect x="216" y="192" width="308" height="36" rx="4" fill="#21262d"/>
  <rect x="220" y="200" width="4" height="20" rx="2" fill="#04c444"/>
  <text x="232" y="213" font-family="sans-serif" font-size="12" font-weight="500" fill="#e6edf3">Pressing Alto + Transición</text>
  <text x="232" y="226" font-family="sans-serif" font-size="10" fill="#8b949e">15 Mar · 45 min · ⭐ 4/5</text>

  <rect x="216" y="234" width="308" height="36" rx="4" fill="#161b22"/>
  <rect x="220" y="242" width="4" height="20" rx="2" fill="#0084c2"/>
  <text x="232" y="255" font-family="sans-serif" font-size="12" font-weight="500" fill="#e6edf3">Rondos + Posesión</text>
  <text x="232" y="268" font-family="sans-serif" font-size="10" fill="#8b949e">12 Mar · 60 min · ⭐ 5/5</text>

  <rect x="216" y="276" width="308" height="36" rx="4" fill="#21262d"/>
  <rect x="220" y="284" width="4" height="20" rx="2" fill="#04c444"/>
  <text x="232" y="297" font-family="sans-serif" font-size="12" font-weight="500" fill="#e6edf3">Finalización + Remates</text>
  <text x="232" y="310" font-family="sans-serif" font-size="10" fill="#8b949e">10 Mar · 50 min · ⭐ 4/5</text>

  <rect x="216" y="318" width="308" height="36" rx="4" fill="#161b22"/>
  <rect x="220" y="326" width="4" height="20" rx="2" fill="#0084c2"/>
  <text x="232" y="339" font-family="sans-serif" font-size="12" font-weight="500" fill="#e6edf3">Defensa Zonal</text>
  <text x="232" y="352" font-family="sans-serif" font-size="10" fill="#8b949e">8 Mar · 55 min · ⭐ 3/5</text>

  <!-- Tactics board panel -->
  <rect x="554" y="156" width="202" height="200" rx="8" fill="#1c2128"/>
  <text x="574" y="180" font-family="sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Tactics Board</text>
  <!-- Mini pitch -->
  <rect x="574" y="190" width="162" height="112" rx="4" fill="#166534"/>
  <!-- Pitch lines -->
  <rect x="574" y="190" width="162" height="112" rx="4" fill="none" stroke="#15803d" stroke-width="1"/>
  <line x1="655" y1="190" x2="655" y2="302" stroke="#15803d" stroke-width="1" opacity="0.6"/>
  <circle cx="655" cy="246" r="20" fill="none" stroke="#15803d" stroke-width="1" opacity="0.6"/>
  <rect x="574" y="220" width="22" height="52" rx="2" fill="none" stroke="#15803d" stroke-width="1" opacity="0.7"/>
  <rect x="714" y="220" width="22" height="52" rx="2" fill="none" stroke="#15803d" stroke-width="1" opacity="0.7"/>
  <!-- Players on pitch -->
  <circle cx="655" cy="200" r="6" fill="#04c444"/>
  <circle cx="625" cy="230" r="6" fill="#04c444"/>
  <circle cx="685" cy="230" r="6" fill="#04c444"/>
  <circle cx="610" cy="262" r="6" fill="#04c444"/>
  <circle cx="655" cy="256" r="6" fill="#0084c2"/>
  <circle cx="700" cy="262" r="6" fill="#04c444"/>
  <circle cx="655" cy="290" r="6" fill="#ef4444"/>
  <!-- Draw line -->
  <text x="574" y="320" font-family="sans-serif" font-size="10" fill="#8b949e">✏ Free draw · Drag &amp; drop</text>

  <!-- Footer bar -->
  <rect x="180" y="460" width="620" height="40" fill="#0d1117"/>
  <text x="204" y="484" font-family="sans-serif" font-size="10" fill="#444c56">Vue 3 + Vite</text>
  <text x="280" y="484" font-family="sans-serif" font-size="10" fill="#444c56">Node.js + Express</text>
  <text x="390" y="484" font-family="sans-serif" font-size="10" fill="#444c56">PostgreSQL</text>
  <text x="466" y="484" font-family="sans-serif" font-size="10" fill="#444c56">JWT Auth</text>
  <text x="520" y="484" font-family="sans-serif" font-size="10" fill="#444c56">Cloudinary</text>
  <text x="590" y="484" font-family="sans-serif" font-size="10" fill="#444c56">Canvas API</text>
</svg>
