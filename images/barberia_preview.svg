  <text x="208" y="382" font-family="sans-serif" font-size="14" font-weight="bold" fill="#c9a84c">desde 14€</text>

  <rect x="348" y="318" width="142" height="76" rx="8" fill="#1a1a1a"/>
  <rect x="348" y="318" width="3" height="76" rx="1" fill="#c9a84c"/>
