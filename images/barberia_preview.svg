  <text x="610" y="172" font-family="sans-serif" font-size="12" fill="#888">+200 reseñas Google</text>
  <rect x="580" y="182" width="68" height="8" rx="4" fill="#c9a84c" opacity="0.8"/>
  <rect x="580" y="182" width="68" height="8" rx="4" fill="#c9a84c" opacity="0.8"/>

  <!-- Services section -->
  <rect x="0" y="272" width="800" height="150" fill="#111111"/>
