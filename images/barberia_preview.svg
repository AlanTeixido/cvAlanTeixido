      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#e8c96a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Navbar bar -->
  <rect x="0" y="0" width="800" height="52" fill="#111111"/>
  <text x="36" y="34" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#c9a84c">BarberStyle BCN</text>
  <rect x="540" y="18" width="70" height="18" rx="3" fill="#1a1a1a"/>
  <rect x="620" y="18" width="60" height="18" rx="3" fill="#1a1a1a"/>
  <rect x="690" y="16" width="76" height="22" rx="4" fill="#c9a84c" opacity="0.9"/>

