  <rect x="560" y="445" width="44" height="18" rx="9" fill="#1a1a1a"/>
  <text x="568" y="458" font-family="sans-serif" font-size="9" fill="#c9a84c">Vue 3</text>
  <rect x="612" y="445" width="36" height="18" rx="9" fill="#1a1a1a"/>
  <text x="620" y="458" font-family="sans-serif" font-size="9" fill="#c9a84c">Vite</text>
  <rect x="656" y="445" width="58" height="18" rx="9" fill="#1a1a1a"/>
  <text x="663" y="458" font-family="sans-serif" font-size="9" fill="#c9a84c">Tailwind</text>
  <rect x="722" y="445" width="44" height="18" rx="9" fill="#1a1a1a"/>
  <text x="729" y="458" font-family="sans-serif" font-size="9" fill="#c9a84c">AOS</text>
